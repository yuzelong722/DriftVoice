{% extends "base.html" %}

{% block title %}经验库 - 研声漂流{% endblock %}

{% block content %}
<section style="padding: var(--space-2xl) 0;">
    <div style="max-width:1280px; margin:0 auto;">
        <!-- 页面顶部 -->
        <div class="page-hero-row" style="display:flex; align-items:center; gap:var(--space-xl); margin-bottom:var(--space-xl);">
            <div style="flex:0 0 auto;">
                <svg viewBox="0 0 120 120" width="90" height="90" fill="none" style="opacity:0.85;">
                    <circle cx="60" cy="60" r="54" fill="#F7FAF7" stroke="#C8D5C8" stroke-width="1"/>
                    <rect x="28" y="24" width="64" height="48" rx="8" fill="#fff" stroke="#8B9E8B" stroke-width="1.5"/>
                    <path d="M60 24 L60 72" stroke="#8B9E8B" stroke-width="1" opacity="0.3"/>
                    <path d="M28 36 L60 48 L92 36" stroke="#8B9E8B" stroke-width="1.2" fill="none"/>
                    <path d="M86 28 L88 32 L92 32 L89 35 L90 39 L86 37 L82 39 L83 35 L80 32 L84 32Z" fill="#D4A853" opacity="0.4"/>
                    <path d="M38 80 L60 68 L82 80" stroke="#C8D5C8" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
                    <circle cx="34" cy="84" r="2.5" fill="#8B9E8B" opacity="0.3"/>
                    <circle cx="60" cy="88" r="2.5" fill="#8B9E8B" opacity="0.2"/>
                    <circle cx="86" cy="84" r="2.5" fill="#8B9E8B" opacity="0.15"/>
                </svg>
            </div>
            <div>
                <div class="section-title" style="margin-bottom:var(--space-xs);">经验库</div>
                <p class="section-desc" style="margin:0;">
                    经提问者授权公开的高质量问答，沉淀为研究生群体的共同经验。<br>
                    这些真实经历可以帮助更多人。
                </p>
            </div>
        </div>

        <!-- 搜索 + 专业筛选 + 分类筛选 -->
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:var(--space-md); align-items:center;">
            <div style="flex:1; min-width:200px; position:relative;">
                <input type="text" id="search-input" class="form-input" style="width:100%; padding-right:36px;" placeholder="搜索问题标题或回复内容…" onkeydown="if(event.key==='Enter')doSearch()">
                <button onclick="doSearch()" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--ink-muted); font-size:16px; line-height:1;">&#128269;</button>
            </div>
            <select id="filter-major" class="form-select" style="width:auto; min-width:120px;" onchange="doFilter()">
                <option value="">全部专业</option>
                <option value="计算机科学">计算机科学</option>
                <option value="电子信息">电子信息</option>
                <option value="生物医学">生物医学</option>
                <option value="机械工程">机械工程</option>
                <option value="金融">金融</option>
                <option value="建筑学">建筑学</option>
                <option value="城乡规划">城乡规划</option>
                <option value="风景园林">风景园林</option>
            </select>
            <button onclick="resetFilters()" class="btn-secondary" style="font-size:13px; padding:6px 14px; white-space:nowrap;">重置</button>
        </div>
        <div class="filter-pills" id="filter-pills">
            <button class="pill active" data-category="all">全部</button>
            <button class="pill" data-category="导师与课题组">导师关系</button>
            <button class="pill" data-category="科研与论文">科研压力</button>
            <button class="pill" data-category="职业规划">就业规划</button>
            <button class="pill" data-category="情绪与压力">情绪支持</button>
            <button class="pill" data-category="人际关系">人际关系</button>
            <button class="pill" data-category="生活适应">生活适应</button>
        </div>

        <!-- 经验列表（JS 动态渲染） -->
        <div id="exp-list" class="exp-grid">
            <div class="empty-state" id="loading-state">
                <p>加载中…</p>
            </div>
        </div>
    </div>
</section>

<!-- 经验详情模态框 -->
<div class="modal-overlay" id="exp-modal">
    <div class="modal-box" style="max-width:700px;">
        <div class="modal-header">
            <h3 id="exp-modal-title">经验详情</h3>
            <button class="modal-close" onclick="closeExpModal()">×</button>
        </div>
        <div class="modal-body" id="exp-container"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let _expData = [];

function doSearch()  { loadExperiences(true); }
function doFilter() { loadExperiences(true); }
function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-major').value = '';
    loadExperiences(true);
}

// ========== 加载经验数据 ==========
async function loadExperiences(forceReload) {
    const list    = document.getElementById('exp-list');
    const loading = document.getElementById('loading-state');

    const major = document.getElementById('filter-major')?.value || '';
    const q = document.getElementById('search-input')?.value.trim() || '';

    const params = new URLSearchParams();
    if (major) params.append('major', major);
    if (q)     params.append('q', q);

    try {
        const res  = await fetch(`{{ url_for('api_get_experiences') }}?${params.toString()}`);
        const data = await res.json();
        loading.style.display = 'none';

        if (!data.length) {
            renderDemoExperiences();
            return;
        }

        _expData = data;
        renderExperiences(data);
    } catch (e) {
        renderDemoExperiences();
    }
}

function renderExperiences(data) {
    const list = document.getElementById('exp-list');
    const activeCategory = document.querySelector('#filter-pills .pill.active')?.dataset.category || 'all';

    const filtered = activeCategory === 'all'
        ? data
        : data.filter(e => e.category === activeCategory);

    if (!filtered.length) {
        list.innerHTML = '<div class="empty-state"><h3>该分类暂无经验</h3></div>';
        return;
    }

    list.innerHTML = filtered.map((e, i) => `
        <div class="card exp-card fade-in" data-category="${e.category || ''}" style="animation-delay:${i * 0.04}s">
            <div class="exp-card-header">
                <span class="tag tag-sage">${e.category || '综合'}</span>
                <span style="font-size:12px; color:var(--ink-muted);">${e.question ? (e.question.created_at || '') : ''}</span>
            </div>
            <div class="exp-title">${e.question ? e.question.title : '（问题已删除）'}</div>
            ${e.reply ? `
                <div class="exp-a" style="margin-top:var(--space-sm);">
                    <strong>精选回复</strong>
                    <div style="font-size:13.5px; color:var(--ink-light); line-height:1.7; margin-top:6px;">
                        ${(e.reply.content || '').substring(0, 180)}${(e.reply.content || '').length > 180 ? '…' : ''}
                    </div>
                </div>
            ` : '<div style="font-size:13px; color:var(--ink-muted);">暂无回复内容</div>'}
            <div class="exp-actions">
                <button class="btn-secondary" onclick="viewExperience(${e.id})" style="font-size:13px;">查看完整讨论</button>
            </div>
        </div>
    `).join('');
}

// Demo 经验数据（每类5-10条，共80+条）
const DEMO_EXPS = [
    // 导师与课题组 (10)
    { id:1, category:'导师与课题组', title:'导师方向与我的兴趣不匹配，该怎么办？', date:'2024-09-15',
      reply:'和导师坦诚沟通非常重要。我当时的做法是准备一个PPT，列出我的兴趣和未来规划，然后请教导师的看法。很多导师其实愿意根据学生的兴趣调整方向。同时也可以考虑在组内找一个副导师，特别是研究方向更接近你兴趣的老师。给自己半年时间尝试，如果真的不行，再考虑换导师也不迟。' },
    { id:2, category:'导师与课题组', title:'和导师沟通总被怼，是不是我太笨了？', date:'2024-09-20',
      reply:'被导师怼是研究生必修课，不是你的问题。建议：1. 组会前先找师兄师姐预演一遍；2. 把导师的批评当作"修改意见"而不是"人身攻击"；3. 会后主动问导师怎么改进；4. 如果真的有言语霸凌，记得保留证据。你现在能提出这个问题，说明你已经在反思和成长了。' },
    { id:3, category:'导师与课题组', title:'导师让我延期毕业，我该怎么办？', date:'2024-10-05',

    { id:4, category:'导师与课题组', title:'导师压着不让实习怎么办？', date:'2024-10-12',
      reply:'导师不让实习确实很常见。我当时是提议每周去2-3天远程实习，并制定了详细的时间安排计划给导师看，最终导师同意了。关键是让导师看到你的负责任态度，以及实习不影响实验进度。' },

    { id:29, category:'职业规划', title:'读博的就业优势到底有多大？', date:'2025-05-15',
      reply:'读博的就业优势取决于你的职业目标。如果想去高校、研究院或大厂的AI Lab，博士是必须的。如果想去工业界做工程师，硕士往往性价比更高。建议你想清楚自己5年后想在哪里做什么，再决定要不要读博。' },
    { id:30, category:'职业规划', title:'实习被压榨，还要继续吗？', date:'2025-06-01',

    // 人际关系 (10)
    { id:31, category:'人际关系', title:'实验室氛围很压抑，每天都不想去', date:'2024-09-28',
      reply:'实验室氛围确实很影响心态。我的经验是：1. 减少在实验室的时间，能远程就远程；2. 找到组内一两个合得来的同学，建立自己的小圈子；3. 把导师当作"老板"而不是"老师"；4. 如果真的严重影响心理健康，换组不丢人。记住：博士生最宝贵的资产是你的心理健康。' },
    { id:32, category:'人际关系', title:'和同门竞争关系很严重', date:'2024-10-15',
      reply:'同门竞争确实很让人心累。建议：1. 保持自己的节奏，不要被别人牵着走；2. 尽量把精力放在提升自己的实力上；3. 如果可能，尝试和同门开诚布公地谈谈；4. 记住你们最终是要一起毕业的，合作共赢比零和博弈好。' },
    { id:33, category:'人际关系', title:'宿舍关系紧张，怎么办？', date:'2024-11-01',
      reply:'宿舍关系紧张确实很让人心烦。建议：1. 主动和室友沟通，了解彼此的需求和底线；2. 制定一些宿舍规则；3. 如果实在合不来，可以考虑搬出宿舍（如果学校允许）；4. 把宿舍当作睡觉的地方，多去实验室或图书馆。' },
    { id:34, category:'人际关系', title:'被师兄性骚扰了，不敢说', date:'2024-11-10',
      reply:'被性骚扰是非常严重的事情，不要沉默。建议：1. 保留证据（聊天记录、邮件等）；2. 向导师、系里或学校相关部门举报；3. 如果害怕报复，可以匿名举报；4. 寻求法律援助，保护自己。记住：错的是骚扰者，不是你。' },
    { id:35, category:'人际关系', title:'同学之间互相攀比，很累', date:'2024-12-01',
      reply:'同辈压力确实很大，但每个人的人生节奏不一样。建议：1. 不要和别人比较；2. 专注于自己的目标和计划；3. 记住成功有很多种定义；4. 如果实在压力大，可以找心理咨询。你的价值不是由你的发表数量或实习公司决定的。' },
    { id:36, category:'人际关系', title:'实验室小团体排挤我', date:'2024-12-15',
      reply:'被排挤的感觉很不好受。建议：1. 不要试图融入一个不欢迎你的团体；2. 找到自己的小圈子，哪怕只有一两个朋友；3. 把注意力放在科研上；4. 如果排挤行为涉及学术资源分配，可以向导师或系里反映。' },
    { id:37, category:'人际关系', title:'和导师沟通总被误解', date:'2025-01-05',

    { id:38, category:'人际关系', title:'导师对我和对其他学生双重标准', date:'2025-02-01',
      reply:'双重标准确实让人很不爽，但这也是学术界的常态。建议：1. 不要公开抱怨，默默努力让自己变得更强；2. 如果确实涉及不公平的资源分配，可以找导师或系里反映；3. 记住你的目标是毕业，不要被情绪牵着走。' },
    { id:39, category:'人际关系', title:'和合作者产生了矛盾', date:'2025-03-01',

    { id:40, category:'人际关系', title:'研一研二研三关系网好复杂', date:'2025-03-15',

    // 情绪与压力 (10)

    { id:42, category:'情绪与压力', title:'博三了还没发文章，家里压力很大', date:'2024-12-01',

    { id:44, category:'情绪与压力', title:'对科研完全失去了兴趣', date:'2025-02-01',

    { id:45, category:'情绪与压力', title:'父母不支持我读研，觉得浪费时间', date:'2025-02-15',

    { id:46, category:'情绪与压力', title:'同龄人都已经工作结婚了，我很慌', date:'2025-03-01',

    { id:47, category:'情绪与压力', title:'博一博二浪费了太多时间', date:'2025-04-01',

    { id:49, category:'情绪与压力', title:'博四了还没达到毕业要求', date:'2025-05-01',

    { id:50, category:'情绪与压力', title:'实验反复失败，快抑郁了', date:'2025-05-15',

    // 生活适应 (10)
    { id:51, category:'生活适应', title:'跨专业考研上岸，现在跟不上课业怎么办', date:'2024-10-18',

    { id:52, category:'生活适应', title:'研究生住宿条件太差了', date:'2024-11-01',

    { id:53, category:'生活适应', title:'不会用Linux和命令行，很慌', date:'2024-11-10',
      reply:'不会Linux是很正常的，现在有很多在线教程可以学习。建议：1. 从基础命令开始学；2. 在虚拟机里练习；3. 找一个懂Linux的同学带你；4. 不要害怕犯错，多动手实践。我研一时也不会Linux，硬着头皮用了半年后就好了。' },
    { id:54, category:'生活适应', title:'研究生生活太单调了', date:'2024-12-01',
      reply:'研究生生活确实容易单调。建议：1. 培养一个爱好；2. 参加学校的社团活动；3. 定期运动和朋友聚会；4. 如果实在无聊，可以找个兼职或实习。记住：研究生只是人生的一段经历，不是全部。要学会在生活和研究之间找到平衡。' },
    { id:55, category:'生活适应', title:'不会社交，研究生要不要交朋友？', date:'2024-12-15',

    { id:56, category:'生活适应', title:'研究生补助太低了', date:'2025-01-05',

    { id:57, category:'生活适应', title:'研究生还要上课吗？感觉和本科没区别', date:'2025-02-01',

    { id:58, category:'生活适应', title:'导师要求打卡考勤，像上班一样', date:'2025-02-15',

    { id:59, category:'生活适应', title:'研究生和本科生的生活方式差别太大', date:'2025-03-01',

    { id:60, category:'生活适应', title:'不会写学术论文，本科完全没训练过', date:'2025-03-15',

function renderDemoExperiences() {
    const list = document.getElementById('exp-list');
    const activeCategory = document.querySelector('#filter-pills .pill.active')?.dataset.category || 'all';
    const filtered = activeCategory === 'all' ? DEMO_EXPS : DEMO_EXPS.filter(d => d.category === activeCategory);

    if (!filtered.length) {
        list.innerHTML = '<div class="empty-state"><h3>该分类暂无经验</h3></div>';
        return;
    }

    list.innerHTML = filtered.map((d, i) => `
        <div class="card exp-card fade-in" data-category="${d.category}" style="animation-delay:${i * 0.04}s">
            <div class="exp-card-header">
                <span class="tag tag-sage">${d.category}</span>
                <span style="font-size:12px; color:var(--ink-muted);">${d.date}</span>
            </div>
            <div class="exp-title">${d.title}</div>
            <div class="exp-a" style="margin-top:var(--space-sm);">
                <strong>精选回复</strong>
                <div style="font-size:13.5px; color:var(--ink-light); line-height:1.7; margin-top:6px;">
                    ${d.reply.substring(0, 180)}…
                </div>
            </div>
            <div class="exp-actions">
                <button class="btn-secondary" onclick="viewDemoExp(${d.id})" style="font-size:13px;">查看完整讨论</button>
            </div>
        </div>
    `).join('');
}

const DEMO_DETAILS = {
    1: { title:'导师方向与我的兴趣不匹配，该怎么办？', content:'研一刚入学，发现导师的研究方向和我在本科时的兴趣不太一样。现在做实验总是提不起兴趣，也不知道该怎么和导师沟通...', reply:'和导师坦诚沟通非常重要。我当时的做法是准备一个PPT，列出我的兴趣和未来规划，然后请教导师的看法。很多导师其实愿意根据学生的兴趣调整方向。同时也可以考虑在组内找一个副导师，特别是研究方向更接近你兴趣的老师。给自己半年时间尝试，如果真的不行，再考虑换导师也不迟。\n\n另外补充一点：研一其实是有转导师的机会的，很多学校研一结束前都可以申请换导师。建议先和心仪的导师沟通好，再正式提出转导师申请。' },
    2: { title:'和导师沟通总被怼，是不是我太笨了？', content:'每次组会汇报，导师都会挑出很多问题，有时当着全组的面说我逻辑不清。现在一要组会就紧张得睡不着...', reply:'被导师怼是研究生必修课，不是你的问题。我研一时也被骂哭过好几次，后来慢慢摸索出了一些应对方法：\n\n1. 组会前先找师兄师姐预演一遍，提前发现逻辑漏洞\n2. 把导师的批评当作"修改意见"而不是"人身攻击"\n3. 会后主动找导师问："您觉得我这次最大的问题是什么？我该怎么改进？"——主动求助往往能让导师态度软化\n4. 如果导师真的有言语霸凌倾向，记得保留证据，必要时向学院反映\n\n你现在能提出这个问题，说明你已经在反思和成长了，这本身就是进步。' },
};

function viewDemoExp(id) {
    const d = DEMO_DETAILS[id] || DEMO_DETAILS[1];
    const modal = document.getElementById('exp-modal');
    document.getElementById('exp-modal-title').textContent = d.title;
    document.getElementById('exp-container').innerHTML = `
        <div style="margin-bottom:var(--space-lg);">
            <div style="font-size:12px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">问题</div>
            <div style="font-size:15px; font-weight:600; line-height:1.5; margin-bottom:var(--space-sm);">${d.title}</div>
            <div style="font-size:14px; color:var(--ink-light); line-height:1.7; white-space:pre-wrap;">${d.content}</div>
        </div>
        <hr style="border:none; border-top:1px solid rgba(45,52,50,0.08); margin:var(--space-md) 0;">
        <div>
            <div style="font-size:12px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px;">回复</div>
            <div class="reply-block">
                <div class="reply-block-header">
                    <span class="reply-style-tag">我经历过类似情况</span>
                    <span style="font-size:12px; color:var(--ink-muted);">匿名研三</span>
                </div>
                <div class="reply-text">${d.reply}</div>
            </div>
        </div>
    `;
    modal.classList.add('show');
}

// ========== 分类筛选 ==========
document.getElementById('filter-pills').addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    document.querySelectorAll('#filter-pills .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderExperiences(_expData || []);
});

// ========== 查看经验详情 ==========
async function viewExperience(expId) {
    const exp = (_expData || []).find(e => e.id === expId);
    if (!exp) return;

    const modal      = document.getElementById('exp-modal');
    const container  = document.getElementById('exp-container');
    document.getElementById('exp-modal-title').textContent = exp.question ? exp.question.title : '经验详情';
    modal.classList.add('show');

    let repliesHtml = '暂无回复';
    if (exp.question) {
        try {
            const res  = await fetch(`/api/questions/${exp.question.id}`);
            const q    = await res.json();
            repliesHtml = (q.replies || []).map(r => `
                <div class="reply-block" style="margin-bottom:var(--space-md);">
                    <div class="reply-block-header">
                        <span class="reply-style-tag">${r.response_style || '匿名回复'}</span>
                        <span style="font-size:12px; color:var(--ink-muted);">${r.user_grade ? '研三' : ''}</span>
                    </div>
                    <div class="reply-text">${(r.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                </div>
            `).join('<hr style="border:none; border-top:1px solid rgba(45,52,50,0.06); margin:var(--space-md) 0;">') || '暂无回复';
        } catch(e) { repliesHtml = '加载回复失败'; }
    }

    container.innerHTML = `
        <div style="margin-bottom:var(--space-lg);">
            <div style="font-size:12px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;">问题</div>
            <div style="font-size:15px; font-weight:600; line-height:1.5; margin-bottom:var(--space-sm);">${exp.question ? exp.question.title : ''}</div>
            <div style="font-size:14px; color:var(--ink-light); line-height:1.7; white-space:pre-wrap;">${exp.question ? exp.question.content : ''}</div>
        </div>
        <hr style="border:none; border-top:1px solid rgba(45,52,50,0.08); margin:var(--space-md) 0;">
        <div style="margin-bottom:var(--space-md);">
            <div style="font-size:12px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px;">回复</div>
            ${repliesHtml}
        </div>
    `;
}

function closeExpModal() {
    document.getElementById('exp-modal').classList.remove('show');
}

// 点击遮罩关闭
document.getElementById('exp-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeExpModal();
});

// 页面加载时执行
document.addEventListener('DOMContentLoaded', loadExperiences);
</script>
{% endblock %}
